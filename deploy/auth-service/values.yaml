# replicaCount: 2

image:
  # 這是你 ECR 的路徑 (不含 Tag)
  repository: "prod-ecommerce/auth-service"
  registry: "851725371209.dkr.ecr.ap-northeast-1.amazonaws.com"
  pullPolicy: IfNotPresent
  tag: "v36-a0f3bb7"

service:
  type: ClusterIP
  port: 80

containerPort: 8000

# 新增：資源限制 (HPA 必備)
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

# 新增：HPA 設定
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80